name: CompHunt
options:
  bundleIdPrefix: com.nhannht
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  CompHuntKit:
    path: ..

targets:
  CompHunt:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: CompHuntKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nhannht.ncomphunt
        PRODUCT_NAME: nCompHunt
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright (c) 2026 Nguyen Huu Thien Nhan. MIT License."
        # No sandbox in either config: the app reads ~/.claude config files.
        CODE_SIGN_STYLE: Manual
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
      configs:
        # Debug: ad-hoc local signature, debugger-friendly.
        Debug:
          CODE_SIGN_IDENTITY: "-"
          ENABLE_HARDENED_RUNTIME: NO
        # Release: Developer ID + hardened runtime for notarized distribution.
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: V3P5U9Z68M
          ENABLE_HARDENED_RUNTIME: YES
